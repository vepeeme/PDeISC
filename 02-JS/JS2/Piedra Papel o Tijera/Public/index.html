<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piedra, Papel, Tijera, Lagarto o Spock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login" id="login-screen">
    <h1>Regístrate</h1>
    <input type="text" id="player1" placeholder="Nombre Jugador 1">
    <input type="text" id="player2" placeholder="Nombre Jugador 2 (opcional, deja vacío para IA)">
    <button id="start-button">Comenzar</button>
  </div>

  <div class="game hidden" id="game-screen">
    <div class="scoreboard">
      <div><span id="label1"></span>: <span id="score1">0</span></div>
      <div><span id="label2"></span>: <span id="score2">0</span></div>
    </div>
    <h2 id="mode-title"></h2>
    <button id="change-mode">Cambiar Modo</button>

    <div id="timer">3</div>

    <div class="prompt">Presiona tecla para elegir:</div>
    <div class="options">
      <div><strong>Jugador 1 (Q W E A S):</strong></div>
      <div>Q: Piedra</div>
      <div>W: Papel</div>
      <div>E: Tijera</div>
      <div>A: Lagarto</div>
      <div>S: Spock</div>

      <div style="margin-top:1rem"><strong>Jugador 2 (I O P K L):</strong></div>
      <div>I: Piedra</div>
      <div>O: Papel</div>
      <div>P: Tijera</div>
      <div>K: Lagarto</div>
      <div>L: Spock</div>
    </div>

    <div id="result"></div>
    <button id="restart-round">Siguiente Ronda</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
